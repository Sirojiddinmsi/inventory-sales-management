services:
  - type: web
    name: tikuv-market-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run build --workspace @inventory/api
    startCommand: node scripts/bootstrap-db.mjs && npm run start --workspace @inventory/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: tikuv-market-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGIN
        value: "*"
      - key: APP_TIMEZONE
        value: Asia/Tashkent
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 200

  - type: web
    name: tikuv-market-web
    runtime: static
    buildCommand: npm ci && npm run build --workspace @inventory/web
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://tikuv-market-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: tikuv-market-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "17"
    databaseName: inventory_sales
    user: inventory
